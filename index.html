 <!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Hádanka</title>

<style>

body {
    font-family: Arial;
    max-width: 700px;
    margin: 80px auto;
    text-align: center;
    background: #f5f5f5;
}

#box {
    background: white;
    padding: 30px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    font-size: 16px;
    margin-top: 15px;
    width: 80%;
}

#error {
    color: red;
    margin-top: 10px;
}

</style>

</head>

<body>

<div id="box">

<h2>🔐 Vyřeš hádanku</h2>

<p>
Kdo půjde na sever, nenajde!<br>
Kdo půjde na východ, nenajde!<br>
Kdo půjde na západ, nenajde!<br>
Hledej černé MMMCCVI na bílé.
</p>

<p><b>Kam půjdeš?</b></p>

<input type="text" id="answer" placeholder="Odpověď">

<br>

<button onclick="check()">Odeslat</button>

<div id="error"></div>

</div>

<script>

const input = document.getElementById("answer");

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        check();
    }
});

function check() {

    let a = input.value.trim().toLowerCase();

    if (a === "jih") {

        window.location.href =
        "https://raw.githubusercontent.com/viktormicanAdventura/ADVENTURA-mapa1/280d6675b722b73b12fd3875f2a37b727b7b10b8/Mapa-1.png";

    } else {

        document.getElementById("error").innerText =
        "Špatně, zkus to znovu.";

    }
}

</script>

</body>
</html>
