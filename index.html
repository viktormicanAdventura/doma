 <!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Hádanka</title>
</head>

<body>

<h2>Vyřeš hádanku</h2>

<input type="text" id="answer">

<button onclick="check()">Odeslat</button>

<p id="error"></p>

<script>

function check() {

    const a = document
        .getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if (a == "jih") {

        alert("Správně!");

    } else {

        document.getElementById("error").innerText =
            "Špatná odpověď";

    }
}

</script>

</body>
</html>
